<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Sonus - Cloud Player</title>
    <link rel="icon" type="image/svg+xml" href="icone.svg">
    
    <script>
        window.onerror = function(m, f, l) {
            window.onload = function() {
                const t = document.getElementById('currentTitle');
                if(t) { t.innerText = "ERRO FATAL"; t.style.color = "#ff3333"; }
            }; return false;
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(10, 10, 12, 0.85);
            --glass-border: rgba(255, 255, 255, 0.04);
            --text-dimmed: #4a4a4d;
            --text-active: #ffffff;
            --highlight: #ffcc00; 
        }

        * { outline: none !important; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: #000000;
            background-image: linear-gradient(rgba(10, 10, 12, 0.92), rgba(0, 0, 0, 0.98)), url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2564&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-active); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        .player-container {
            display: flex; width: 90vw; max-width: 1400px; height: 85vh; background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 16px; box-shadow: 0 40px 100px rgba(0,0,0,0.95); overflow: hidden; transition: all 0.3s ease;
        }

        .player-container.idle { cursor: none; }
        .player-container.idle .player-controls-wrapper { opacity: 0; pointer-events: none; transform: translateY(10px); }

        .main-player { flex: 1; display: flex; flex-direction: column; padding: 40px 40px 20px 40px; position: relative; min-height: 0; }
        .now-playing-info { display: flex; align-items: center; gap: 0; margin-bottom: 25px; justify-content: center; }
        .song-titles h2 { margin: 0; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; text-align: center; }

        .fs-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }
        
        .player-container:fullscreen, .player-container:-webkit-full-screen, .player-container.pseudo-fullscreen { 
            background: radial-gradient(circle at center, #111115 0%, #000000 100%) !important;
            border-radius: 0 !important; border: none !important; width: 100dvw !important; height: 100dvh !important;
        }
        .player-container.pseudo-fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; z-index: 9999 !important; margin: 0 !important; }
        
        .player-container:fullscreen .playlist-sidebar, .player-container:-webkit-full-screen .playlist-sidebar, .player-container.pseudo-fullscreen .playlist-sidebar,
        .player-container:fullscreen .now-playing-info, .player-container:-webkit-full-screen .now-playing-info, .player-container.pseudo-fullscreen .now-playing-info { display: none !important; }

        .player-container:fullscreen .player-controls-wrapper, .player-container:-webkit-full-screen .player-controls-wrapper, .player-container.pseudo-fullscreen .player-controls-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; margin: 0; padding: 40px 60px calc(20px + env(safe-area-inset-bottom)) 60px !important;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, #000000 60%, #000000 100%) !important; border-top: none; z-index: 100;
        }

        .lyrics-window { flex: 1; position: relative; overflow: hidden; cursor: pointer; touch-action: manipulation;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%) !important;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%) !important;
        }
        .lyrics-track { position: absolute; width: 100%; display: flex; flex-direction: column; align-items: center; transition: transform 0.4s cubic-bezier(0.2, 0.4, 0.3, 1); pointer-events: none; }
        .line { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; font-weight: 800; text-align: center; color: var(--text-dimmed); transition: color 0.3s, transform 0.3s; width: 100%; }
        .line.active { color: var(--text-active); text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .word { display: inline-block; margin: 0 6px; transition: color 0.05s; }
        .word.highlight { color: var(--highlight); text-shadow: 0 0 15px rgba(255, 204, 0, 0.15); }

        .player-controls-wrapper { border-top: 1px solid var(--glass-border); margin-top: 20px; padding-top: 20px; display: flex; flex-direction: column; gap: 15px; transition: opacity 0.4s ease, transform 0.4s ease; }
        .progress-container { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.8); font-weight: 600; }
        input[type="range"] { -webkit-appearance: none; flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; accent-color: #ffffff; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ffffff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.6); transition: transform 0.1s; }

        .action-buttons { display: flex; justify-content: center; align-items: center; gap: 25px; position: relative; }
        .icon-btn { background: none; border: none; color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .icon-btn:hover { color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); transform: scale(1.05); }
        .icon-btn.active-state { color: var(--highlight); filter: drop-shadow(0 0 8px rgba(255,204,0,0.3)); }
        .play-btn { background: #ffffff; color: #000000; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; }
        .play-btn:hover { background: #e0e0e0; color: #000000; transform: scale(1.05); filter: none; }

        .right-controls { position: absolute; right: 0; display: flex; align-items: center; gap: 15px; }
        .volume-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .volume-slider-wrapper { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); width: 36px; height: 110px; background: rgba(15, 15, 18, 0.95); border: 1px solid var(--glass-border); border-radius: 8px; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.2s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 10; }
        .volume-container:hover .volume-slider-wrapper { opacity: 1; visibility: visible; bottom: 35px; }
        #volumeSlider { width: 90px; transform: rotate(-90deg); margin: 0; }

        /* PLAYLIST E ABAS */
        .playlist-sidebar { width: 400px; background: rgba(5, 5, 5, 0.6); border-left: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; position: relative; min-height: 0; }
        
        .tabs-container { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { background: transparent; border: none; color: #555; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; cursor: pointer; padding: 10px 12px; transition: all 0.3s; position: relative; white-space: nowrap; }
        .tab-btn.active { color: var(--highlight); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: var(--highlight); }
        
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.75rem; font-weight: 700; color: #888; }
        
        .btn-add { background: transparent; border: 1px solid #444; color: #ffffff; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: all 0.2s; display: flex; justify-content: center; align-items: center; height: 30px; }
        .btn-add:hover { background: #222; border-color: #666; color: var(--highlight); }

        .playlist { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .playlist li { padding: 12px 15px; margin-bottom: 8px; background: #111; border: 1px solid #222; border-left: 4px solid transparent; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; cursor: pointer; }
        .playlist li:hover { border-color: #444; background: #1a1a1a; }
        .playlist li.active-track { background: #1a1a1a; border-left: 4px solid var(--highlight); border-color: #333; }
        .playlist li.active-track .track-title { color: var(--highlight); }
        .playlist li.active-track .playing-icon { display: block; }
        .playlist li.sortable-ghost { opacity: 0.4; background: #222; }
        
        .drag-handle { display: none; margin-right: 10px; color: #555; cursor: grab; }
        body:not(.tab-mode-music) .drag-handle { display: block; }
        body:not(.tab-mode-music) .playlist li { cursor: grab; }

        .track-info { display: flex; flex-direction: column; flex: 1; pointer-events: none; overflow: hidden; }
        .track-title { font-weight: 700; font-size: 0.9rem; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%; }
        
        .track-actions { display: flex; gap: 8px; align-items: center; }
        .action-icon { cursor: pointer; transition: all 0.2s; color: #fff; display: flex; padding: 5px; border-radius: 4px; }
        .action-icon:hover { background: rgba(255,255,255,0.1); }
        .action-icon.delete-btn:hover { color: #ff3333; opacity: 1 !important; }
        .action-icon.check-btn:hover { color: var(--highlight); opacity: 1 !important; }

        .playing-icon { display: none; width: 15px; height: 15px; position: relative; margin-right:10px; }
        .playing-icon span { display: block; bottom: 0; width: 3px; height: 5px; background: var(--highlight); position: absolute; animation: bounce 1s infinite ease-in-out; }
        .playing-icon span:nth-child(1) { left: 0; animation-delay: 0s; }
        .playing-icon span:nth-child(2) { left: 6px; animation-delay: 0.2s; }
        .playing-icon span:nth-child(3) { left: 12px; animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { height: 5px; } 50% { height: 15px; } }
        body.is-paused .playing-icon span { animation: none !important; height: 3px !important; }

        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 500; font-weight: bold; color: var(--highlight); display: none; }
        .upload-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .upload-modal.show { opacity: 1; visibility: visible; }
        .upload-content { background: rgba(15, 15, 18, 0.95); border: 1px solid var(--glass-border); padding: 40px; border-radius: 16px; text-align: center; width: 550px; }
        .dropzone { border: 2px dashed #444; border-radius: 12px; padding: 50px 20px; margin: 20px 0; color: #888; cursor: pointer; transition: all 0.2s; }
        .dropzone.dragover { border-color: var(--highlight); background: rgba(255,204,0,0.05); color: #fff; }
        .empty-state { text-align: center; color: #666; margin-top: 40px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .player-container { flex-direction: column; width: 100vw; height: 100dvh; border-radius: 0; border: none; }
            .main-player { flex: 1 1 55%; min-height: 0; padding: 20px 15px 10px 15px; }
            .playlist-sidebar { flex: 1 1 45%; min-height: 0; width: 100%; border-left: none; border-top: 1px solid var(--glass-border); padding: 15px; }
            .line { font-size: 1.6rem; height: 45px; } .song-titles h2 { font-size: 1.3rem; } 
            .action-buttons { width: 100%; justify-content: center; gap: 18px; }
            .right-controls { position: absolute; right: 0; top: 50%; transform: translateY(-50%); } 
            .volume-container { display: none; } 
            .player-container:fullscreen .player-controls-wrapper, .player-container.pseudo-fullscreen .player-controls-wrapper { padding: 40px 15px calc(20px + env(safe-area-inset-bottom)) 15px !important; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.8) 25%, #000000 50%, #000000 100%) !important; }
        }
    </style>
</head>
<body class="is-paused tab-mode-playlist">

    <div class="upload-modal" id="uploadModal">
        <div class="upload-content">
            <h3>Adicionar Nova Música</h3>
            <div id="uploadStatus" style="color: var(--highlight); margin-bottom: 10px; display: none;">Enviando para a nuvem...</div>
            <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <p>Arraste arquivos ou toque para selecionar</p>
                <p><span>(Áudio: .mp3, .wav, .m4a) | Letras: (.lrc, .txt)</span></p>
                <p id="uploadSubtitle" style="margin-top:15px; font-size:0.8rem;">Elas irão para a aba atual.</p>
                <input type="file" id="fileInput" multiple accept=".mp3,.wav,.flac,.ogg,.m4a,.aac,.lrc,.txt" style="display:none;">
            </div>
            <button class="btn-close" onclick="toggleModal(false)" style="margin-top:20px; width:100%; padding:12px; background:#222; color:#fff; border:none; border-radius:8px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="player-container" id="playerApp">
        <div class="main-player">
            <div class="now-playing-info">
                <div class="song-titles"><h2 id="currentTitle">CARREGANDO...</h2><p id="currentArtist"></p></div>
            </div>

            <div class="fs-wrapper" id="fsWrapper">
                <div class="lyrics-window" id="lyricsWindow"><div class="lyrics-track" id="lyricsTrack"></div></div>

                <div class="player-controls-wrapper" id="playerControls">
                    <div class="progress-container">
                        <span id="timeCurrent">0:00</span><input type="range" id="seekSlider" value="0" max="100" step="0.1"><span id="timeTotal">0:00</span>
                    </div>
                    <div class="action-buttons">
                        <button class="icon-btn" id="shuffleBtn" onclick="toggleShuffle();" title="Aleatório"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg></button>
                        <button class="icon-btn" onclick="prevTrack();" title="Anterior"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button class="icon-btn play-btn" id="playBtn" onclick="togglePlay();"><svg id="playSvg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="transform: translateX(1px);"><path d="M8 5v14l11-7z"/></svg></button>
                        <button class="icon-btn" onclick="nextTrack();" title="Próximo"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                        <button class="icon-btn" id="repeatBtn" onclick="toggleRepeat();" title="Repetir"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
                        <div class="right-controls">
                            <div class="volume-container"><button class="icon-btn" onclick="toggleMute();"><svg id="volIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button><div class="volume-slider-wrapper"><input type="range" id="volumeSlider" value="100" max="100"></div></div>
                            <button class="icon-btn" id="fullscreenBtn" onclick="toggleFullScreen();"><svg id="fsIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="playlist-sidebar" id="sidebarArea">
            <div id="loadingOverlay" class="loading-overlay">Sincronizando...</div>
            
            <div class="tabs-container">
                <button class="tab-btn active" id="tabPlaylist" onclick="switchTab('PLAYLIST')">PLAYLIST</button>
                <button class="tab-btn" id="tabMusic" onclick="switchTab('MUSIC')">MUSIC</button>
                <button class="tab-btn" id="tabQuestion" onclick="switchTab('QUESTION')">QUESTION</button>
                <button class="tab-btn" id="tabPhrases" onclick="switchTab('PHRASES')">PHRASES</button>
            </div>

            <div class="playlist-header">
                <span id="tabSubtitle">Fila de Estudos</span>
                <button class="btn-add" onclick="handleUploadClick()" title="Adicionar Música">+</button>
            </div>

            <ul class="playlist" id="playlist"></ul>
            <div id="emptyState" class="empty-state" style="display:none;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rbdfvutkyqbvwpialhmk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiZGZ2dXRreXFidndwaWFsaG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTExNDMsImV4cCI6MjA5MjA4NzE0M30.4iHKZPBuMxmh6Sc7eujHIJW7wQsf7KaJeb204G2RtkU';
        const SENHA_ADMIN = "1994";

        let _supabase;
        try { _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch (e) { alert("Erro de conexão."); }

        const audio = new Audio();
        let dbAllTracks = [], displayList = [], playbackQueue = [];
        let currentTrackId = null, isShuffle = false, repeatMode = 0, activeTab = 'PLAYLIST';
        let uploadTargetTab = 'PLAYLIST';

        const track = document.getElementById('lyricsTrack'), lyricsWindow = document.getElementById('lyricsWindow'), playerApp = document.getElementById('playerApp');
        const seekSlider = document.getElementById('seekSlider'), timeCurrent = document.getElementById('timeCurrent'), timeTotal = document.getElementById('timeTotal');
        const playBtn = document.getElementById('playBtn'), playlistUI = document.getElementById('playlist'), emptyState = document.getElementById('emptyState');
        const volumeSlider = document.getElementById('volumeSlider'), uploadModal = document.getElementById('uploadModal');

        const playIconSVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="transform: translateX(1px);"><path d="M8 5v14l11-7z"/></svg>`;
        const pauseIconSVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

        function pedirSenha(acao) {
            const pwd = prompt(`Digite a senha para ${acao}:`);
            if (pwd === SENHA_ADMIN) return true;
            if (pwd !== null) alert("Senha incorreta!");
            return false;
        }

        function toggleModal(show) { 
            if (show) uploadModal.classList.add('show'); 
            else uploadModal.classList.remove('show'); 
        }

        function handleUploadClick() { 
            uploadTargetTab = activeTab; 
            if(pedirSenha(`adicionar músicas na aba ${uploadTargetTab}`)) {
                document.getElementById('uploadSubtitle').innerHTML = `Elas irão direto para a aba <strong>${uploadTargetTab}</strong>.`;
                toggleModal(true);
            }
        }

        function switchTab(tabName) {
            activeTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab' + tabName.charAt(0) + tabName.slice(1).toLowerCase()).classList.add('active');
            
            document.body.className = (document.body.classList.contains('is-paused') ? 'is-paused ' : '') + 'tab-mode-' + tabName.toLowerCase();
            
            const titles = { 'PLAYLIST': 'Fila de Estudos', 'MUSIC': 'Acervo Geral', 'QUESTION': 'Dúvidas e Questões', 'PHRASES': 'Treino de Frases' };
            document.getElementById('tabSubtitle').innerText = titles[tabName];
            processDisplayList();
        }

        function processDisplayList() {
            if (activeTab === 'MUSIC') {
                displayList = dbAllTracks.filter(t => !t.is_question && !t.is_phrases && !t.is_atual).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } else if (activeTab === 'QUESTION') {
                displayList = dbAllTracks.filter(t => t.is_question).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } else if (activeTab === 'PHRASES') {
                displayList = dbAllTracks.filter(t => t.is_phrases).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } else {
                displayList = dbAllTracks.filter(t => t.is_atual).sort((a, b) => a.ordem - b.ordem);
            }
            renderUIPlaylist();
        }

        let sortable = new Sortable(playlistUI, {
            animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost',
            onEnd: async function (evt) {
                if (activeTab === 'MUSIC' || evt.oldIndex === evt.newIndex) return;
                const item = displayList.splice(evt.oldIndex, 1)[0];
                displayList.splice(evt.newIndex, 0, item);
                
                const col = { 'PLAYLIST': 'is_atual', 'QUESTION': 'is_question', 'PHRASES': 'is_phrases' }[activeTab];
                const updates = displayList.map((track, index) => {
                    track.ordem = index;
                    return { id: track.id, title: track.title, audio_url: track.audio_url, lrc_url: track.lrc_url, [col]: true, ordem: index };
                });
                renderUIPlaylist();
                try { await _supabase.from('playlist').upsert(updates); } catch(e) {}
            }
        });

        async function fetchPlaylist() {
            if (!_supabase) return;
            try {
                document.getElementById('loadingOverlay').style.display = 'flex';
                const { data, error } = await _supabase.from('playlist').select('*');
                if (error) throw error;
                
                dbAllTracks = data.map(row => ({
                    id: row.id, title: row.title, artist: "",
                    audioUrl: row.audio_url, lrcUrl: row.lrc_url, 
                    is_atual: !!row.is_atual, is_question: !!row.is_question, is_phrases: !!row.is_phrases,
                    ordem: row.ordem || 0, created_at: row.created_at, songData: []
                }));
                
                processDisplayList();
                document.getElementById('loadingOverlay').style.display = 'none';
                
                if (dbAllTracks.length === 0) { document.getElementById('currentTitle').innerText = "NENHUMA MÚSICA"; } 
                else if (!currentTrackId) {
                    let initList = dbAllTracks.filter(t => t.is_atual).sort((a, b) => a.ordem - b.ordem);
                    if(initList.length === 0) initList = dbAllTracks.filter(t => !t.is_question && !t.is_phrases).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    if(initList.length > 0) { playbackQueue = [...initList]; loadTrack(0, false); }
                }
            } catch (err) { showFatalError("ERRO NO BANCO DE DADOS", err.message); }
        }

        function renderUIPlaylist() {
            playlistUI.innerHTML = '';
            if (displayList.length === 0) { emptyState.style.display = 'block'; emptyState.innerHTML = `Esta aba está vazia.<br>Clique no <strong>+</strong> para subir arquivos.`; return; }
            emptyState.style.display = 'none';

            displayList.forEach((trackObj, index) => {
                const li = document.createElement('li');
                li.setAttribute('data-id', trackObj.id);
                if (trackObj.id == currentTrackId) li.classList.add('active-track');
                
                li.onclick = (e) => { if (e.target.closest('.action-icon')) return; playbackQueue = [...displayList]; loadTrack(index, true); };

                let actionHTML = '';
                if (activeTab === 'PLAYLIST') {
                    actionHTML = `<div class="action-icon" onclick="toggleAtualState('${trackObj.id}', false)" title="Remover da Playlist"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>`;
                } else {
                    const isAdded = trackObj.is_atual;
                    const checkColor = isAdded ? "var(--highlight)" : "#fff";
                    const checkOpacity = isAdded ? "1" : "0.3";
                    actionHTML = `<div class="action-icon check-btn" onclick="toggleAtualState('${trackObj.id}', ${!isAdded})" title="Adicionar/Remover da Playlist" style="color:${checkColor}; opacity:${checkOpacity};"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>`;
                    actionHTML += `<div class="action-icon delete-btn" onclick="deleteFromGeral('${trackObj.id}')" title="Excluir"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div>`;
                }

                li.innerHTML = `<div class="drag-handle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></div><div class="playing-icon"><span></span><span></span><span></span></div><div class="track-info"><span class="track-title">${index + 1}. ${trackObj.title}</span></div><div class="track-actions">${actionHTML}</div>`;
                playlistUI.appendChild(li);
            });
        }

        async function toggleAtualState(id, isAtual) {
            const track = dbAllTracks.find(t => t.id == id); if (!track) return;
            track.is_atual = isAtual; 
            if(isAtual) {
                const maxOrdem = Math.max(0, ...dbAllTracks.filter(t => t.is_atual).map(t => t.ordem));
                track.ordem = maxOrdem + 1;
            }
            processDisplayList(); 
            try { await _supabase.from('playlist').update({ is_atual: isAtual, ordem: track.ordem }).eq('id', id); } catch(e) {}
        }

        // ==========================================
        // NOVA LIXEIRA INTELIGENTE COM LIMPEZA DE STORAGE
        // ==========================================
        async function deleteFromGeral(id) {
            if (!pedirSenha("excluir permanentemente do servidor")) return;
            const track = dbAllTracks.find(t => t.id == id); if (!track) return;
            if (!confirm(`Confirmar exclusão de '${track.title}'? Isso não pode ser desfeito.`)) return;
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            try {
                let filesToRemove = [];
                
                if (track.audioUrl) {
                    const audioPath = decodeURIComponent(track.audioUrl.split('/public/audio-files/')[1]);
                    if (audioPath) filesToRemove.push(audioPath);
                }
                
                if (track.lrcUrl) {
                    const lrcPath = decodeURIComponent(track.lrcUrl.split('/public/audio-files/')[1]);
                    if (lrcPath) filesToRemove.push(lrcPath);
                }

                if (filesToRemove.length > 0) {
                    const { error: storageError } = await _supabase.storage.from('audio-files').remove(filesToRemove);
                    if (storageError) console.error("Erro ao apagar arquivos físicos:", storageError);
                }

                await _supabase.from('playlist').delete().eq('id', id);
                await fetchPlaylist(); 
                
                if (currentTrackId == id) {
                    audio.pause(); audio.src = ""; currentTrackId = null;
                    document.getElementById('currentTitle').innerText = "NENHUMA MÚSICA";
                    document.getElementById('lyricsTrack').innerHTML = ""; playBtn.innerHTML = playIconSVG;
                }
            } catch(e) { 
                alert("Erro ao excluir."); 
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none'; 
            }
        }

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.addEventListener(eventName, preventDefaults, false);
            document.getElementById('dropzone').addEventListener(eventName, preventDefaults, false);
        });

        document.getElementById('dropzone').addEventListener('dragover', () => { document.getElementById('dropzone').classList.add('dragover'); });
        document.getElementById('dropzone').addEventListener('dragleave', () => { document.getElementById('dropzone').classList.remove('dragover'); });
        document.getElementById('dropzone').addEventListener('drop', (e) => {
            document.getElementById('dropzone').classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        document.getElementById('fileInput').onchange = (e) => { handleFiles(e.target.files); };

        let pendingFiles = { audio: {}, lrcs: {} };
        function handleFiles(files) {
            const validAudioExts = ['mp3', 'wav', 'ogg', 'flac', 'm4a', 'aac'];
            Array.from(files).forEach(file => {
                const nameParts = file.name.split('.'); const ext = nameParts.pop().toLowerCase(); const baseName = nameParts.join('.');
                if (validAudioExts.includes(ext)) { pendingFiles.audio[baseName] = file; } 
                else if (ext === 'lrc' || ext === 'txt') { pendingFiles.lrcs[baseName] = file; }
            });
            processFiles();
        }

        async function processFiles() {
            if (!_supabase) return; document.getElementById('uploadStatus').style.display = 'block';
            const keys = Object.keys(pendingFiles.audio);
            const isQ = uploadTargetTab === 'QUESTION';
            const isP = uploadTargetTab === 'PHRASES';
            const isA = uploadTargetTab === 'PLAYLIST';
            
            for (let i = 0; i < keys.length; i++) {
                const baseName = keys[i]; const audioFile = pendingFiles.audio[baseName]; const lrcFile = pendingFiles.lrcs[baseName]; 
                try {
                    const safeAudioName = audioFile.name.replace(/[^a-zA-Z0-9.\-]/g, "_");
                    const audioPath = `music/${Date.now()}_${safeAudioName}`;
                    await _supabase.storage.from('audio-files').upload(audioPath, audioFile);
                    const publicAudioUrl = _supabase.storage.from('audio-files').getPublicUrl(audioPath).data.publicUrl;

                    let publicLrcUrl = null;
                    if (lrcFile) {
                        const safeLrcName = lrcFile.name.replace(/[^a-zA-Z0-9.\-]/g, "_");
                        const lrcPath = `lyrics/${Date.now()}_${safeLrcName}`;
                        await _supabase.storage.from('audio-files').upload(lrcPath, lrcFile);
                        publicLrcUrl = _supabase.storage.from('audio-files').getPublicUrl(lrcPath).data.publicUrl;
                    }

                    let novaOrdem = 0;
                    if (isA) {
                        const ordens = dbAllTracks.filter(t => t.is_atual).map(t => t.ordem);
                        novaOrdem = ordens.length > 0 ? Math.max(...ordens) + 1 : 0;
                    }

                    await _supabase.from('playlist').insert([{
                        title: baseName, artist: '', audio_url: publicAudioUrl, lrc_url: publicLrcUrl,
                        is_atual: isA, is_question: isQ, is_phrases: isP, ordem: novaOrdem
                    }]);
                } catch (error) { alert("Erro ao fazer upload: " + error.message); }
            }
            pendingFiles = { audio: {}, lrcs: {} }; document.getElementById('uploadStatus').style.display = 'none'; toggleModal(false); document.getElementById('fileInput').value = ""; fetchPlaylist();
        }

        audio.addEventListener('play', () => document.body.classList.remove('is-paused'));
        audio.addEventListener('pause', () => document.body.classList.add('is-paused'));

        async function loadTrack(idx, autoPlay = false) {
            if (idx < 0 || idx >= playbackQueue.length) return;
            const trackObj = playbackQueue[idx]; 
            currentTrackId = trackObj.id; 
            
            document.querySelectorAll('.playlist li').forEach(li => li.classList.remove('active-track'));
            const activeLi = document.querySelector(`.playlist li[data-id="${trackObj.id}"]`); 
            if(activeLi) activeLi.classList.add('active-track');
            
            document.getElementById('currentTitle').innerText = trackObj.title; 
            audio.src = trackObj.audioUrl;
            
            if (trackObj.lrcUrl && trackObj.songData.length === 0) { 
                try { 
                    const r = await fetch(trackObj.lrcUrl); 
                    if(r.ok) { trackObj.songData = parseLRC(await r.text()); } 
                } catch(e){} 
            }
            renderLyrics(); 
            if(autoPlay) audio.play().then(()=>playBtn.innerHTML=pauseIconSVG).catch(()=>playBtn.innerHTML=playIconSVG);
            else playBtn.innerHTML=playIconSVG;
        }

        function togglePlay() { if(audio.paused) audio.play().then(()=>playBtn.innerHTML=pauseIconSVG); else { audio.pause(); playBtn.innerHTML=playIconSVG; } }
        function nextTrack() { let i = playbackQueue.findIndex(x=>x.id==currentTrackId)+1; if(i>=playbackQueue.length) i=0; loadTrack(i,true); }
        function prevTrack() { let i = playbackQueue.findIndex(x=>x.id==currentTrackId)-1; if(i<0) i=playbackQueue.length-1; loadTrack(i,true); }
        audio.addEventListener('ended', () => { if(repeatMode==2){ audio.currentTime=0; audio.play(); } else nextTrack(); });

        function getLineHeight() { return window.innerWidth <= 768 ? 45 : 70; }
        function parseLRC(txt) {
            const lines = txt.split('\n'); const parsedData = []; let id = 0;
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lines.forEach(line => {
                const match = timeRegex.exec(line);
                if (match) {
                    const timeMs = parseInt(match[1])*60000 + parseInt(match[2])*1000 + parseInt(match[3])*(match[3].length==2?10:1);
                    let text = line.replace(timeRegex, '').trim(); if (!text) return; 
                    let words = []; text.split(/\s+/).forEach(w => { words.push({ w: w, t: timeMs }); });
                    parsedData.push({ id: id++, text: text, words: words, t: timeMs });
                }
            }); return parsedData;
        }

        function renderLyrics() {
            track.innerHTML = ''; const t = playbackQueue.find(x=>x.id==currentTrackId);
            if(!t || !t.songData.length) { track.innerHTML = '<div class="line" style="font-size: 1.5rem;">[Nenhuma letra sincronizada encontrada]</div>'; positionTrack(0); return; }
            t.songData.forEach(l => {
                const d = document.createElement('div'); d.className='line'; d.id='line-'+l.id;
                l.words.forEach((w,i)=>{ const s=document.createElement('span'); s.className='word'; s.id=`word-${l.id}-${i}`; s.innerText=w.w; d.appendChild(s); });
                track.appendChild(d);
            }); positionTrack(0);
        }

        function positionTrack(idx) {
            const lh = getLineHeight(), wh = lyricsWindow.clientHeight;
            const targetY = window.innerWidth <= 768 ? wh*0.65 : (document.fullscreenElement ? wh/2 : lh*3);
            track.style.transform = `translateY(${targetY - (idx*lh)}px)`;
        }

        function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function updateProgressFill(slider) { const p = (slider.value / slider.max) * 100; slider.style.background = `linear-gradient(to right, #ffffff ${p}%, #333 ${p}%)`; }

        audio.addEventListener('timeupdate', () => {
            seekSlider.value = audio.currentTime; timeCurrent.innerText = formatTime(audio.currentTime); updateProgressFill(seekSlider);
            const t = playbackQueue.find(x=>x.id==currentTrackId); if(!t || !t.songData) return;
            const ms = audio.currentTime*1000; let act = -1;
            t.songData.forEach((l,i) => { if (ms >= l.t) act = i; });
            t.songData.forEach((l,i) => {
                const el = document.getElementById('line-'+l.id); if(!el) return;
                if(i===act) { el.classList.add('active'); l.words.forEach((w,wi)=>document.getElementById(`word-${l.id}-${wi}`).classList.add('highlight')); } 
                else { el.classList.remove('active'); l.words.forEach((w,wi)=>document.getElementById(`word-${l.id}-${wi}`).classList.remove('highlight')); }
            });
            if(act>=0) positionTrack(act); else if(audio.currentTime===0) positionTrack(0);
        });

        audio.addEventListener('loadedmetadata', () => { seekSlider.max = audio.duration; timeTotal.innerText = formatTime(audio.duration); updateProgressFill(seekSlider); });

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffleBtn').classList.toggle('active-state'); }
        function toggleRepeat() {
            repeatMode = (repeatMode+1)%3; const btn = document.getElementById('repeatBtn');
            if(repeatMode===0){btn.classList.remove('active-state'); btn.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;}
            else if(repeatMode===1){btn.classList.add('active-state'); btn.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;}
            else{btn.classList.add('active-state'); btn.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="16" font-size="8" text-anchor="middle" font-family="sans-serif" stroke="none" fill="currentColor">1</text></svg>`;}
        }

        let prevVol = 100, isMuted = false;
        function toggleMute() {
            if(isMuted) { isMuted=false; volumeSlider.value=prevVol; audio.volume=prevVol/100; }
            else { prevVol=volumeSlider.value>0?volumeSlider.value:100; isMuted=true; volumeSlider.value=0; audio.volume=0; }
            updateProgressFill(volumeSlider); updateVolIcon();
        }
        function updateVolIcon() {
            const icon = document.getElementById('volIcon');
            if(isMuted || audio.volume===0) icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
            else icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
        }
        volumeSlider.oninput = function() { audio.volume=this.value/100; updateProgressFill(this); if(this.value>0&&isMuted)isMuted=false; else if(this.value==0&&!isMuted)isMuted=true; updateVolIcon(); };

        function updateFsIcon(fs) {
            document.getElementById('fsIcon').innerHTML = fs ? `<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>` : `<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>`;
            setTimeout(()=>positionTrack(audio.currentTime===0?0:-1),100);
        }
        function toggleFullScreen() {
            const fs = document.fullscreenElement || playerApp.classList.contains('pseudo-fullscreen');
            if(!fs) { if(playerApp.requestFullscreen)playerApp.requestFullscreen().catch(()=>{playerApp.classList.add('pseudo-fullscreen'); updateFsIcon(true);}); else{playerApp.classList.add('pseudo-fullscreen'); updateFsIcon(true);} }
            else { if(document.fullscreenElement)document.exitFullscreen(); if(playerApp.classList.contains('pseudo-fullscreen')){playerApp.classList.remove('pseudo-fullscreen'); updateFsIcon(false);} }
        }
        document.onfullscreenchange = () => updateFsIcon(!!document.fullscreenElement);

        seekSlider.oninput = function() { audio.currentTime=this.value; updateProgressFill(this); };
        window.onresize = () => setTimeout(()=>updateProgressFill(seekSlider),100);

        let idleTimer;
        function resetIdleTimer() { playerApp.classList.remove('idle'); clearTimeout(idleTimer); idleTimer=setTimeout(()=>playerApp.classList.add('idle'),1000); }
        playerApp.onmousemove = playerApp.ontouchstart = playerApp.onclick = resetIdleTimer;
        playerApp.onmouseleave = () => { clearTimeout(idleTimer); playerApp.classList.add('idle'); };

        document.onclick = (e) => { const b=e.target.closest('button'); if(b)b.blur(); };

        let clickTimer = null;
        lyricsWindow.onclick = (e) => {
            if(clickTimer===null) clickTimer=setTimeout(()=>{clickTimer=null; togglePlay();},250);
            else { clearTimeout(clickTimer); clickTimer=null; toggleFullScreen(); }
        };

        document.onkeydown = (e) => {
            if(e.target.tagName==='INPUT'&&e.target.type!=='range') return;
            const k = e.key.toLowerCase(), c = e.code;
            if(c==='Space'||k===' ') { e.preventDefault(); togglePlay(); }
            else if(c==='ArrowRight'||k==='arrowright') { e.preventDefault(); nextTrack(); }
            else if(c==='ArrowLeft'||k==='arrowleft') { e.preventDefault(); prevTrack(); }
            else if(c==='KeyF'||k==='f') { e.preventDefault(); toggleFullScreen(); }
            else if(c==='ArrowUp'||k==='arrowup') { e.preventDefault(); volumeSlider.value=Math.min(100,parseInt(volumeSlider.value)+5); audio.volume=volumeSlider.value/100; updateProgressFill(volumeSlider); if(volumeSlider.value>0&&isMuted){isMuted=false;updateVolIcon();} }
            else if(c==='ArrowDown'||k==='arrowdown') { e.preventDefault(); volumeSlider.value=Math.max(0,parseInt(volumeSlider.value)-5); audio.volume=volumeSlider.value/100; updateProgressFill(volumeSlider); if(volumeSlider.value==0&&!isMuted){isMuted=true;updateVolIcon();} }
            resetIdleTimer();
        };

        window.onload = () => { switchTab('PLAYLIST'); if(!document.getElementById('currentTitle').innerText.includes('ERRO')) fetchPlaylist(); };
    </script>
</body>
</html>
